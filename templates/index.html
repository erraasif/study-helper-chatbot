<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMate AI - Executive Console</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            overflow: hidden;
        }
        .app-window {
            width: 96vw;
            max-width: 1280px;
            height: 92vh;
            background-color: #111726;
            border: 1px solid #1e293b;
            border-radius: 20px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Premium Left Panel */
        .sidebar-container {
            width: 320px;
            background-color: #090d16;
            border-right: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
        }
        .identity-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .identity-card h5 { font-size: 11px; text-transform: uppercase; color: #38bdf8; letter-spacing: 1px; font-weight: 700; }
        .identity-card p { font-size: 13px; color: #94a3b8; margin-top: 4px; font-weight: 500; }
        .btn-universal {
            width: 100%;
            padding: 14px;
            background-color: #0284c7;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .btn-universal:hover { background-color: #0369a1; }
        .rooms-scroll-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .rooms-scroll-list::-webkit-scrollbar { width: 4px; }
        .rooms-scroll-list::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        .room-row-node {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .room-row-node:hover, .room-row-node.active-room-node {
            background-color: #1e293b;
            color: #ffffff;
            border-color: #334155;
        }
        .config-knob-panel {
            background-color: #0f172a;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #1e293b;
        }
        .config-knob-panel label { display: flex; justify-content: space-between; font-size: 12.5px; color: #94a3b8; margin-bottom: 10px; font-weight: 500; }
        .config-knob-panel label span:last-child { color: #38bdf8; font-weight: 700; }
        .config-knob-panel input[type="range"] { width: 100%; accent-color: #0284c7; cursor: pointer; }
        
        /* Main Right Workspace */
        .workspace-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #0d121f;
        }
        .workspace-top-bar {
            padding: 22px 32px;
            background-color: #111726;
            border-bottom: 1px solid #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .workspace-top-bar h2 { font-size: 17px; font-weight: 600; color: #ffffff; }
        .server-status-badge { display: flex; align-items: center; gap: 8px; background-color: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); padding: 6px 14px; border-radius: 20px; font-size: 12px; color: #34d399; font-weight: 600; }
        
        .chat-bubbles-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chat-bubbles-viewport::-webkit-scrollbar { width: 5px; }
        .chat-bubbles-viewport::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .bubble-frame {
            max-width: 75%;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 14.5px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .bubble-frame-bot { background-color: #111726; color: #e2e8f0; align-self: flex-start; border: 1px solid #1e293b; }
        .bubble-frame-user { background-color: #0284c7; color: #ffffff; align-self: flex-end; }
        .stream-loading-label { color: #38bdf8; font-size: 13px; font-style: italic; display: none; padding-left: 32px; margin-bottom: 16px; font-weight: 500; }
        
        .dock-input-wrapper {
            padding: 24px 32px;
            background-color: #111726;
            border-top: 1px solid #1e293b;
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .dock-input-wrapper input {
            flex: 1;
            padding: 14px 20px;
            background-color: #090d16;
            border: 1px solid #1e293b;
            border-radius: 10px;
            font-size: 14.5px;
            color: #ffffff;
            outline: none;
            transition: border-color 0.15s ease;
        }
        .dock-input-wrapper input:focus { border-color: #0284c7; }
        .btn-submit-action { width: auto; padding: 14px 28px; }
    </style>
</head>
<body>
<div class="app-window">
    <div class="sidebar-container">
        
            <h4>Google Account</h4>
            <p>intern.erra@zylo.tech</p>
        </div>
        <button class="btn-universal" onclick="instantiateNewSession()">+ Create Room</button>
        <div class="rooms-scroll-list" id="sessionsContainer"></div>
        <div class="config-knob-panel">
            <label><span>Temperature</span><span id="tempValueLabel">0.4</span></label>
            <input type="range" id="temperatureSlider" min="0.0" max="1.0" step="0.1" value="0.4" oninput="document.getElementById('tempValueLabel').innerText=this.value"/>
        </div>
    </div>
    <div class="workspace-container">
        <div class="workspace-top-bar">
            <h2>StudyMate AI Production Console</h2>
            <div class="server-status-badge">System Live</div>
        </div>
        <div class="chat-bubbles-viewport" id="chatViewPort"></div>
        <div class="stream-loading-label" id="streamIndicator">Processing core stream array...</div>
        <div class="dock-input-wrapper">
            <input type="text" id="userTextPrompt" placeholder="Type your academic or engineering question here..." onkeydown="if(event.key==='Enter') executeMessageTransaction()"/>
            <button class="btn-universal btn-submit-action" onclick="executeMessageTransaction()">Send</button>
        </div>
    </div>
</div>
<script>
let mockSessionsDatabase = [
    { id: "sess_uuid_aa11", title: "Python Arrays Analysis" },
    { id: "sess_uuid_bb22", title: "FastAPI Routing Rules" }
];
let currentActiveSessionUUID = "sess_uuid_aa11";
const simulateOAuthHeaderSignatureToken = "Bearer google_mock_oauth_signature_hash_token_786";

function renderSessionsSidebarLayout() {
    const box = document.getElementById('sessionsContainer');
    if (!box) return;
    box.innerHTML = '';
    mockSessionsDatabase.forEach(item => {
        const isActive = item.id === currentActiveSessionUUID ? 'active-room-node' : '';
        box.innerHTML += `<div class="room-row-node ${isActive}" onclick="switchSessionScopeUUID('${item.id}')">📝 ${item.title}</div>`;
    });
}

function instantiateNewSession() {
    const randomHexID = "sess_uuid_" + Math.random().toString(16).substring(2, 6);
    const titleText = prompt("Enter Chat Room Title Name:", "New Study Chapter Topic");
    if (!titleText) return;
    mockSessionsDatabase.unshift({ id: randomHexID, title: titleText });
    currentActiveSessionUUID = randomHexID;
    renderSessionsSidebarLayout();
    document.getElementById('chatViewPort').innerHTML = '';
}

async function switchSessionScopeUUID(id) {
    currentActiveSessionUUID = id;
    renderSessionsSidebarLayout();
    
    const chatView = document.getElementById('chatViewPort');
    chatView.innerHTML = `<div class="bubble-frame bubble-frame-bot">Syncing session log entries...</div>`;
    
    try {
        const response = await fetch(`/chat/history/${id}`, {
            method: 'GET',
            headers: { 'Authorization': simulateOAuthHeaderSignatureToken }
        });
        const data = await response.json();
        
        chatView.innerHTML = '';
        if (data.status === "success" && data.history.length > 0) {
            data.history.forEach(msg => {
                const bubbleClass = msg.role === 'user' ? 'bubble-frame-user' : 'bubble-frame-bot';
                chatView.innerHTML += `<div class="bubble-frame ${bubbleClass}">${msg.content}</div>`;
            });
        } else {
            chatView.innerHTML = `<div class="bubble-frame bubble-frame-bot">No previous records found in this context.</div>`;
        }
    } catch (err) {
        chatView.innerHTML = `<div class="bubble-frame bubble-frame-bot">Fallback: History lookup timeout.</div>`;
    }
    chatView.scrollTop = chatView.scrollHeight;
}

async function executeMessageTransaction() {
    const promptInputNode = document.getElementById('userTextPrompt');
    const userText = promptInputNode.value.trim();
    if (!userText) return;

    const chatView = document.getElementById('chatViewPort');
    const indicator = document.getElementById('streamIndicator');

    chatView.innerHTML += `<div class="bubble-frame bubble-frame-user">${userText}</div>`;
    promptInputNode.value = '';
    indicator.style.display = 'block';
    chatView.scrollTop = chatView.scrollHeight;

    const botBubbleNode = document.createElement('div');
    botBubbleNode.className = 'bubble-frame bubble-frame-bot';
    chatView.appendChild(botBubbleNode);

    const tempKnobValue = parseFloat(document.getElementById('temperatureSlider').value);

    try {
        const networkResponse = await fetch('/chat/stream', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': simulateOAuthHeaderSignatureToken
            },
            body: JSON.stringify({
                message: userText,
                session_id: currentActiveSessionUUID,
                temperature: tempKnobValue
            })
        });

        if (networkResponse.status === 401) {
            botBubbleNode.innerHTML = "Security Access Exception: OAuth verification rejected.";
            indicator.style.display = 'none';
            return;
        }

        const dataReaderStream = networkResponse.body.getReader();
        const textDecoderDecoder = new TextDecoder();
        indicator.style.display = 'none';
        
        let accumulatedBotTextLogsBuffer = "";

        while (true) {
            const { value, done } = await dataReaderStream.read();
            if (done) break;

            const decryptedChunk = textDecoderDecoder.decode(value);
            const stringLinesArrays = decryptedChunk.split('\n');
            
            for (const item of stringLinesArrays) {
                if (item.startsWith('data: ')) {
                    const cleanJSONString = item.substring(6).trim();
                    try {
                        const parsedObject = JSON.parse(cleanJSONString);
                        if (parsedObject.token) {
                            botBubbleNode.innerHTML += parsedObject.token;
                            accumulatedBotTextLogsBuffer += parsedObject.token;
                            chatView.scrollTop = chatView.scrollHeight;
                        }
                        if (parsedObject.done) {
                            await fetch('/chat/save', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': simulateOAuthHeaderSignatureToken
                                },
                                body: JSON.stringify({
                                    session_id: currentActiveSessionUUID,
                                    role: "user",
                                    content: userText
                                })
                            });
                            
                            await fetch('/chat/save', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': simulateOAuthHeaderSignatureToken
                                },
                                body: JSON.stringify({
                                    session_id: currentActiveSessionUUID,
                                    role: "assistant",
                                    content: accumulatedBotTextLogsBuffer
                                })
                            });
                        }
                    } catch(e) {}
                }
            }
        }
    } catch (err) {
        indicator.style.display = 'none';
        botBubbleNode.innerHTML = "Transmission disconnected.";
    }
}

renderSessionsSidebarLayout();
</script>
</body>
</html>
