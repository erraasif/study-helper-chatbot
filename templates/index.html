<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMate AI Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f1f5f9;
            overflow: hidden;
        }
        .app-window {
            width: 95vw;
            max-width: 1240px;
            height: 90vh;
            background-color: #111726;
            border: 1px solid #1e293b;
            border-radius: 16px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .sidebar {
            width: 280px;
            background-color: #090d16;
            border-right: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
        }
        .identity-badge {
            background-color: #111726;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #1e293b;
        }
        .identity-badge h5 { font-size: 11px; text-transform: uppercase; color: #38bdf8; letter-spacing: 0.5px; }
        .identity-badge p { font-size: 12.5px; color: #94a3b8; margin-top: 4px; }
        .btn-action {
            width: 100%;
            padding: 12px;
            background-color: #0284c7;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-action:hover { background-color: #0369a1; }
        .rooms-pane {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .room-item-row {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13.5px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.15s;
        }
        .room-item-row:hover, .room-item-row.active-node {
            background-color: #1e293b;
            color: #ffffff;
        }
        .knob-box {
            background-color: #111726;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #1e293b;
        }
        .knob-box label { display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .knob-box input[type="range"] { width: 100%; accent-color: #0284c7; cursor: pointer; }
        
        .workspace-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #0d121f;
        }
        .top-bar {
            padding: 20px 28px;
            background-color: #111726;
            border-bottom: 1px solid #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar h2 { font-size: 16px; font-weight: 600; }
        .live-pill { background-color: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); padding: 4px 10px; border-radius: 12px; font-size: 11.5px; color: #34d399; font-weight: 600; }
        
        .chat-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .msg-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14.5px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .bubble-bot { background-color: #111726; color: #e2e8f0; align-self: flex-start; border: 1px solid #1e293b; }
        .bubble-user { background-color: #0284c7; color: #ffffff; align-self: flex-end; }
        .loading-text { color: #38bdf8; font-size: 13px; font-style: italic; display: none; padding-left: 28px; margin-bottom: 12px; }
        
        .input-bar-dock {
            padding: 20px 28px;
            background-color: #111726;
            border-top: 1px solid #1e293b;
            display: flex;
            gap: 12px;
        }
        .input-bar-dock input {
            flex: 1;
            padding: 12px 16px;
            background-color: #090d16;
            border: 1px solid #1e293b;
            border-radius: 8px;
            font-size: 14px;
            color: #ffffff;
            outline: none;
        }
        .input-bar-dock input:focus { border-color: #0284c7; }
        .btn-send { width: auto; padding: 12px 24px; }
    </style>
</head>
<body>
<div class="app-window">
    <div class="sidebar">
        
            <h5>Google Account</h5>
            <p>intern.erra@zylo.tech</p>
        </div>
        <button class="btn-action" onclick="instantiateNewSession()">+ Create Room</button>
        <div class="rooms-pane" id="sessionsContainer"></div>
        <div class="knob-box">
            <label><span>Temperature</span><span id="tempValueLabel">0.4</span></label>
            <input type="range" id="temperatureSlider" min="0.0" max="1.0" step="0.1" value="0.4" oninput="document.getElementById('tempValueLabel').innerText=this.value"/>
        </div>
    </div>
    <div class="workspace-view">
        <div class="top-bar">
            <h2>StudyMate AI Production Console</h2>
            <div class="live-pill">System Live</div>
        </div>
        <div class="chat-scroll-area" id="chatViewPort"></div>
        <div class="loading-text" id="streamIndicator">Generating content stream...</div>
        <div class="input-bar-dock">
            <input type="text" id="userTextPrompt" placeholder="Type your software study question..." onkeydown="if(event.key==='Enter') executeMessageTransaction()"/>
            <button class="btn-action btn-send" onclick="executeMessageTransaction()">Send</button>
        </div>
    </div>
</div>
<script>
let mockSessionsDatabase = [
    { id: "sess_uuid_aa11", title: "Python Arrays Analysis" },
    { id: "sess_uuid_bb22", title: "FastAPI Routing Rules" }
];
let currentActiveSessionUUID = "sess_uuid_aa11";

function renderSessionsSidebarLayout() {
    const box = document.getElementById('sessionsContainer');
    if (!box) return;
    box.innerHTML = '';
    mockSessionsDatabase.forEach(item => {
        const isActive = item.id === currentActiveSessionUUID ? 'active-node' : '';
        box.innerHTML += `<div class="room-item-row ${isActive}" onclick="switchSessionScopeUUID('${item.id}')">📝 ${item.title}</div>`;
    });
}

function instantiateNewSession() {
    const randomHexID = "sess_uuid_" + Math.random().toString(16).substring(2, 6);
    const titleText = prompt("Enter Chat Room Title Name:", "New Study Chapter Topic");
    if (!titleText) return;
    mockSessionsDatabase.unshift({ id: randomHexID, title: titleText });
    currentActiveSessionUUID = randomHexID;
    renderSessionsSidebarLayout();
    document.getElementById('chatViewPort').innerHTML = '';
}

function switchSessionScopeUUID(id) {
    currentActiveSessionUUID = id;
    renderSessionsSidebarLayout();
    document.getElementById('chatViewPort').innerHTML = `<div class="msg-bubble bubble-bot">Switched workspace room cleanly. Sandbox ready.</div>`;
}

async function executeMessageTransaction() {
    const promptInputNode = document.getElementById('userTextPrompt');
    const userText = promptInputNode.value.trim();
    if (!userText) return;

    const chatView = document.getElementById('chatViewPort');
    const indicator = document.getElementById('streamIndicator');

    chatView.innerHTML += `<div class="msg-bubble bubble-user">${userText}</div>`;
    promptInputNode.value = '';
    indicator.style.display = 'block';
    chatView.scrollTop = chatView.scrollHeight;

    const botBubbleNode = document.createElement('div');
    botBubbleNode.className = 'msg-bubble bubble-bot';
    chatView.appendChild(botBubbleNode);

    const tempKnobValue = parseFloat(document.getElementById('temperatureSlider').value);

    try {
        const networkResponse = await fetch('/chat/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: userText,
                session_id: currentActiveSessionUUID,
                temperature: tempKnobValue
            })
        });

        const dataReaderStream = networkResponse.body.getReader();
        const textDecoderDecoder = new TextDecoder();
        indicator.style.display = 'none';
        
        botBubbleNode.innerHTML = ""; // Clear loader before printing incoming data streams

        while (true) {
            const { value, done } = await dataReaderStream.read();
            if (done) break;

            const decryptedChunk = textDecoderDecoder.decode(value);
            const stringLinesArrays = decryptedChunk.split('\n');
            
            for (const item of stringLinesArrays) {
                if (item.startsWith('data: ')) {
                    const cleanJSONString = item.substring(6).trim();
                    try {
                        const parsedObject = JSON.parse(cleanJSONString);
                        if (parsedObject.token) {
                            botBubbleNode.innerHTML += parsedObject.token;
                            chatView.scrollTop = chatView.scrollHeight;
                        }
                    } catch(e) {}
                }
            }
        }
    } catch (err) {
        indicator.style.display = 'none';
        botBubbleNode.innerHTML = "Stream loop transmission disconnected.";
    }
}

renderSessionsSidebarLayout();
</script>
</body>
</html>
